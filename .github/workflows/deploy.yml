name: Deploy to production (Plesk VPS)

# Automatic deployment for alymelife.com
# On every push to `main`, rsync the static site to the Plesk VPS web root.
# Can also be run on demand from the Actions tab (workflow_dispatch).
# Deploys the repo root to httpdocs; server-side nginx config is managed in Plesk.

on:
  push:
    branches: [main]
    # Skip deploys for changes that never reach the server anyway.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch: {}

# Never run two deploys at once; if a new push lands mid-deploy, let the
# in-flight one finish (don't cancel a partial rsync to a live site).
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync to httpdocs
    runs-on: ubuntu-latest
    # Bind to a GitHub Environment so you can (optionally) add required
    # reviewers / protection rules later without touching this file.
    environment:
      name: production
      url: https://alymelife.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify CSS & JS for production
        # Minifies the checked-out working copy only — the repo source files
        # stay readable and hand-editable. The minified versions are what gets
        # rsynced to the server. If minification fails, the job stops here and
        # NOTHING is deployed (rsync never runs), so the live site is untouched.
        run: |
          set -euo pipefail
          for f in styles.css pages.css chronicles.css; do
            [ -f "$f" ] || continue
            tmp="$(mktemp)"
            npx --yes clean-css-cli@5 -o "$tmp" "$f"
            mv "$tmp" "$f"
            chmod 644 "$f"   # mktemp makes 600; nginx must be able to read it
            echo "minified $f"
          done
          for f in app.js image-slot.js doc-page.js yt-embed.js; do
            [ -f "$f" ] || continue
            # Temp keeps a .js extension so `node --check` recognizes the format.
            tmp="$(mktemp --suffix=.js)"
            npx --yes terser@5 "$f" --compress --mangle -o "$tmp"
            node --check "$tmp"
            mv "$tmp" "$f"
            chmod 644 "$f"   # mktemp makes 600; nginx must be able to read it
            echo "minified $f"
          done

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known_hosts
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          # Trailing slash on ./ means "contents of repo root", not the dir itself.
          # No --delete: we never remove server-side files (backups, uploads,
          # image-slot state) that aren't tracked in the repo. Matches deploy.sh.
          rsync -avz --human-readable \
            --chmod=D755,F644 \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.gitignore' \
            --exclude 'docs/' \
            --exclude 'deploy.sh' \
            --exclude 'README.md' \
            --exclude 'dist/' \
            --exclude '*.csv' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=yes" \
            ./ "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
