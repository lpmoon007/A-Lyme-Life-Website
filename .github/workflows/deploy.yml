name: Deploy to production (Plesk VPS)

# Automatic deployment for alymelife.com
# On every push to `main`, rsync the static site to the Plesk VPS web root.
# Can also be run on demand from the Actions tab (workflow_dispatch).
# Deploys the repo root to httpdocs; server-side nginx config is managed in Plesk.

on:
  push:
    branches: [main]
    # Skip deploys for changes that never reach the server anyway.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch: {}

# Never run two deploys at once; if a new push lands mid-deploy, let the
# in-flight one finish (don't cancel a partial rsync to a live site).
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync to httpdocs
    runs-on: ubuntu-latest
    # Bind to a GitHub Environment so you can (optionally) add required
    # reviewers / protection rules later without touching this file.
    environment:
      name: production
      url: https://alymelife.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2   # need the parent commit so we can diff changed pages for IndexNow

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify CSS & JS for production
        # Minifies the checked-out working copy only — the repo source files
        # stay readable and hand-editable. The minified versions are what gets
        # rsynced to the server. If minification fails, the job stops here and
        # NOTHING is deployed (rsync never runs), so the live site is untouched.
        run: |
          set -euo pipefail
          for f in styles.css pages.css chronicles.css; do
            [ -f "$f" ] || continue
            tmp="$(mktemp)"
            npx --yes clean-css-cli@5 -o "$tmp" "$f"
            mv "$tmp" "$f"
            chmod 644 "$f"   # mktemp makes 600; nginx must be able to read it
            echo "minified $f"
          done
          for f in app.js image-slot.js doc-page.js yt-embed.js; do
            [ -f "$f" ] || continue
            # Temp keeps a .js extension so `node --check` recognizes the format.
            tmp="$(mktemp --suffix=.js)"
            npx --yes terser@5 "$f" --compress --mangle -o "$tmp"
            node --check "$tmp"
            mv "$tmp" "$f"
            chmod 644 "$f"   # mktemp makes 600; nginx must be able to read it
            echo "minified $f"
          done

      - name: Minify HTML for production
        # Same principle as CSS/JS: only the deployed copy is minified — repo
        # source stays readable and hand-editable. JSON-LD blocks
        # (<script type="application/ld+json">) are NOT touched by --minify-js,
        # so structured data is preserved byte-for-byte. --case-sensitive and
        # --keep-closing-slash preserve the site's custom <image-slot> element
        # and XHTML-style self-closing tags.
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in *.html; do
            tmp="$(mktemp --suffix=.html)"
            npx --yes html-minifier-terser@7 \
              --collapse-whitespace --remove-comments \
              --minify-css true --minify-js true \
              --keep-closing-slash --case-sensitive \
              -o "$tmp" "$f"
            mv "$tmp" "$f"
            chmod 644 "$f"   # mktemp makes 600; nginx must be able to read it
            echo "minified $f"
          done

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known_hosts
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          # Trailing slash on ./ means "contents of repo root", not the dir itself.
          # No --delete: we never remove server-side files (backups, uploads,
          # image-slot state) that aren't tracked in the repo. Matches deploy.sh.
          rsync -avz --human-readable \
            --chmod=D755,F644 \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.gitignore' \
            --exclude 'docs/' \
            --exclude 'deploy.sh' \
            --exclude 'README.md' \
            --exclude 'dist/' \
            --exclude '*.csv' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=yes" \
            ./ "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}"

      - name: Normalize & verify file permissions on server
        # Belt-and-suspenders: make sure every deployed file is world-readable
        # (nginx runs as a different user) and every directory is traversable,
        # then print the result so the perms are visible in the run log.
        env:
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "${PORT}" -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${REMOTE_PATH}' \
             && find . -type f -exec chmod 644 {} + \
             && find . -type d -exec chmod 755 {} + \
             && echo '--- perms after chmod ---' \
             && ls -la styles.css pages.css chronicles.css app.js image-slot.js doc-page.js yt-embed.js index.html"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify IndexNow (Bing, Yandex, et al.) of changed pages
        # Instantly tells IndexNow-participating engines which pages changed in
        # this deploy so they recrawl fast. The key is public by design (hosted
        # at the keyLocation .txt below), so it isn't a secret. Never fails the
        # deploy — search-engine notification is best-effort.
        env:
          INDEXNOW_KEY: 60374e204ee043e7c64b65f7ed0755e8
        run: |
          set -uo pipefail
          git rev-parse HEAD~1 >/dev/null 2>&1 && CHANGED="$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- '*.html' || true)" || CHANGED=""
          if [ -z "$CHANGED" ]; then echo "No HTML pages changed in this deploy — skipping IndexNow."; exit 0; fi
          BODY="$(CHANGED="$CHANGED" python3 -c "import os,json; b='https://alymelife.com'; k=os.environ['INDEXNOW_KEY']; u=sorted({(b+'/' if f=='index.html' else b+'/'+f) for f in os.environ['CHANGED'].split() if f}); print(json.dumps({'host':'alymelife.com','key':k,'keyLocation':b+'/'+k+'.txt','urlList':u}))")"
          echo "Submitting to IndexNow: $BODY"
          CODE="$(curl -sS -o /tmp/indexnow_resp -w '%{http_code}' -X POST 'https://api.indexnow.org/IndexNow' -H 'Content-Type: application/json; charset=utf-8' --data "$BODY" || echo 000)"
          echo "IndexNow responded: HTTP $CODE"; cat /tmp/indexnow_resp 2>/dev/null || true
          exit 0
