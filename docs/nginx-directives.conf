# ============================================================
# PERFORMANCE + SECURITY
# ============================================================

# ---- GZIP COMPRESSION ----
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_proxied any;
gzip_types text/plain text/css text/xml application/xml application/rss+xml application/json application/javascript application/x-javascript text/javascript image/svg+xml application/manifest+json;

# ---- SECURITY HEADERS (server-level defaults) ----
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# ---- BROWSER CACHING ----
# NOTE: a location with its own add_header drops inherited headers,
# so HSTS + nosniff are repeated here on purpose.
location ~* \.(?:css|js|woff2?|ttf|otf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}
location ~* \.(?:png|jpe?g|gif|webp|svg|ico|avif)$ {
    expires 60d;
    add_header Cache-Control "public, max-age=5184000, immutable";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    access_log off;
}
